<style>
  body {
    font-family: 'Roboto';
    font-size: 22px;
  }

  h1 {
    text-shadow: 0 0 30px #9400d3, 0 0 50px #96006b;
    text-align: center;
  }

  h2 {
    text-shadow: 0 0 20px #9400d3;
    margin-top: 30px;
  }

  .generator-section {
    margin: 30px 0;
    padding: 20px;
    border: 2px solid #36006b;
    border-radius: 8px;
    background-color: #0a0015;
  }

  .result-display {
    font-size: 28px;
    min-height: 60px;
    padding: 15px;
    margin: 15px 0;
    border: 1px solid #5a008a;
    border-radius: 4px;
    background-color: #000000;
    text-align: center;
    color: #e0e0e0;
  }

  .generate-btn {
    color: #fff;
    font-weight: normal;
    font-size: 18px;
    background: #36006b;
    border-radius: 40px;
    padding: 10px 30px;
    border: none;
    cursor: pointer;
    transition: .3s ease;
    box-shadow: rgba(54, 0, 107, 0.4) 5px 5px, rgba(54, 0, 107, 0.3) 10px 10px;
  }

  .generate-btn:hover {
    background: #5a00b0;
    box-shadow: none;
  }

  .generator-description {
    font-size: 16px;
    color: #b0b0b0;
    margin-bottom: 15px;
  }

  .options-row {
    margin: 10px 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  ::-webkit-scrollbar {
    width: 10px;
  }

  ::-webkit-scrollbar-track {
    background: #000000;
  }

  ::-webkit-scrollbar-thumb {
    background: #36006b;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: #9800ff;
  }
</style>

function randomItem(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

const formats = [
  "first-last", "first-nickname-last", "first-the-nickname-last", "first-adj-nickname-last",
  "first-the-adj-nickname-last", "nickname-first", "nickname-last", "adj-nickname-first",
  "adj-nickname-last", "the-nickname-first", "the-nickname-last", "the-adj-nickname-first",
  "the-adj-nickname-last"
];

function generateUltimate(format) {
  if (format === 'random') {
    format = randomItem(formats);
  }
  
  const parts = format.split('-');
  let name = parts.map(part => {
    switch(part) {
      case 'first': return randomItem(firstNames);
      case 'last': return randomItem(lastNames);
      case 'nickname': return randomItem(nicknames);
      case 'adj': return randomItem(adjectives);
      case 'the': return 'The';
      default: return part;
    }
  }).join(' ');
  
  document.getElementById('name-result').textContent = name;
}

  "Rot", "Plague", "Dead", "Haunted", "Grave", "Vile", "Drunken", "Abuse", "Nameless", "Void"
];

const townSuffixes = [
  "way", "fair", "grove", "way Wood", "fall", "hill", "vale", "town", " Market", "field",
  "cliffs", "cliff", "hollow", "well", "key", "doom Hold", "soul", "church", "rise", "heart"
];

function generateTown() {
  const prefix = randomItem(townPrefixes);
  const suffix = randomItem(townSuffixes);
  document.getElementById('town-result').textContent = prefix + suffix;
}

function generateTowns(count) {
  const towns = [];
  for (let i = 0; i < count; i++) {
    const prefix = randomItem(townPrefixes);
    const suffix = randomItem(townSuffixes);
    towns.push(prefix + suffix);
  }
  document.getElementById('town-result').innerHTML = towns.join('<br>');
}
